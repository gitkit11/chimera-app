<svg viewBox="0 0 56 56" width="56" height="56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0A0F1A"/>
      <stop offset="100%" stop-color="#030508"/>
    </radialGradient>
    <filter id="gg" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#94A3B8" flood-opacity="0.8"/>
    </filter>
  </defs>
  <circle cx="28" cy="28" r="27" fill="url(#g1)"/>
  <circle cx="28" cy="28" r="27" fill="none" stroke="#94A3B8" stroke-width="1.5" opacity="0.65"/>

  <g filter="url(#gg)" fill="none" stroke="#94A3B8" stroke-linecap="round">
    <!-- Radar outer ring -->
    <circle cx="28" cy="28" r="18" stroke-width="1.2" opacity="0.8"/>
    <!-- Radar middle ring -->
    <circle cx="28" cy="28" r="12" stroke-width="0.9" opacity="0.55"/>
    <!-- Radar inner ring -->
    <circle cx="28" cy="28" r="6" stroke-width="0.8" opacity="0.4"/>
    <!-- Cross hairs -->
    <line x1="28" y1="9" x2="28" y2="47" stroke-width="0.8" opacity="0.45"/>
    <line x1="9" y1="28" x2="47" y2="28" stroke-width="0.8" opacity="0.45"/>
    <!-- Diagonal hairs -->
    <line x1="15" y1="15" x2="41" y2="41" stroke-width="0.5" opacity="0.25"/>
    <line x1="41" y1="15" x2="15" y2="41" stroke-width="0.5" opacity="0.25"/>
    <!-- Radar sweep arc (bright) -->
    <path d="M28,28 L28,10 A18,18 0 0,1 46,28" fill="rgba(148,163,184,0.12)" stroke="none"/>
    <path d="M28,10 A18,18 0 0,1 46,28" stroke="#E2E8F0" stroke-width="1.8" opacity="0.85"/>
    <!-- Target dot -->
    <circle cx="36" cy="20" r="2.5" fill="#E2E8F0" stroke="none" opacity="0.9"/>
    <circle cx="36" cy="20" r="5" fill="none" stroke="#94A3B8" stroke-width="0.8" opacity="0.5"/>
    <!-- Center dot -->
    <circle cx="28" cy="28" r="2" fill="#CBD5E1" stroke="none"/>
  </g>
</svg>
