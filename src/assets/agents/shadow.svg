<svg viewBox="0 0 56 56" width="56" height="56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="e1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050B1F"/>
      <stop offset="100%" stop-color="#010208"/>
    </radialGradient>
    <radialGradient id="e2" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="45%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </radialGradient>
    <filter id="eg" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#3B82F6" flood-opacity="0.9"/>
    </filter>
    <filter id="eg2" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="2.5" flood-color="#60A5FA" flood-opacity="1"/>
    </filter>
  </defs>
  <circle cx="28" cy="28" r="27" fill="url(#e1)"/>
  <circle cx="28" cy="28" r="27" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.6"/>

  <!-- Faint outer glow rings -->
  <circle cx="28" cy="28" r="21" fill="none" stroke="#1E3A5F" stroke-width="0.8" opacity="0.5"/>
  <circle cx="28" cy="28" r="15" fill="none" stroke="#1E3A5F" stroke-width="0.6" opacity="0.35"/>

  <g filter="url(#eg)">
    <!-- Eye shape: perfect almond / vesica piscis -->
    <path d="M5,28 Q16,11 28,11 Q40,11 51,28 Q40,45 28,45 Q16,45 5,28 Z"
      fill="#070E20" stroke="#3B82F6" stroke-width="1.4"/>

    <!-- Iris -->
    <circle cx="28" cy="28" r="12" fill="url(#e2)" filter="url(#eg2)"/>

    <!-- Inner ring -->
    <circle cx="28" cy="28" r="8.5" fill="none" stroke="#93C5FD" stroke-width="0.9" opacity="0.6"/>

    <!-- Vertical slit pupil -->
    <ellipse cx="28" cy="28" rx="3" ry="9" fill="#00000F"/>

    <!-- Specular -->
    <ellipse cx="23" cy="22" rx="3" ry="2" fill="white" opacity="0.65"/>
    <ellipse cx="22" cy="21" rx="1.2" ry="0.8" fill="white" opacity="0.4"/>
  </g>

  <!-- Eyelashes top -->
  <line x1="10" y1="20" x2="14" y2="24" stroke="#3B82F6" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
  <line x1="17" y1="14" x2="20" y2="19" stroke="#3B82F6" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
  <line x1="25" y1="12" x2="27" y2="17" stroke="#3B82F6" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
  <line x1="31" y1="12" x2="29" y2="17" stroke="#3B82F6" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
  <line x1="38" y1="14" x2="35" y2="19" stroke="#3B82F6" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
  <line x1="45" y1="20" x2="41" y2="24" stroke="#3B82F6" stroke-width="1.3" stroke-linecap="round" opacity="0.7"/>
  <!-- Eyelashes bottom -->
  <line x1="10" y1="36" x2="14" y2="32" stroke="#3B82F6" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="45" y1="36" x2="41" y2="32" stroke="#3B82F6" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <!-- Corner stars -->
  <circle cx="6" cy="28" r="1.4" fill="#60A5FA" opacity="0.8"/>
  <circle cx="50" cy="28" r="1.4" fill="#60A5FA" opacity="0.8"/>
  <circle cx="16" cy="8"  r="0.9" fill="#93C5FD" opacity="0.65"/>
  <circle cx="40" cy="8"  r="0.9" fill="#93C5FD" opacity="0.65"/>
</svg>
