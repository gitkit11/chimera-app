<svg viewBox="0 0 64 64" width="64" height="64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fbBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="fbBall" cx="38%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#DDD6FE"/>
      <stop offset="45%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#2E1065"/>
    </radialGradient>
    <clipPath id="fbClip">
      <circle cx="32" cy="32" r="20"/>
    </clipPath>
    <filter id="fbGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#A78BFA" flood-opacity="0.75"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0D0B1E"/>
  <rect width="64" height="64" rx="14" fill="none" stroke="url(#fbBorder)" stroke-width="1.5"/>

  <!-- Ball base with glow — NO clipPath here to avoid filter conflict -->
  <circle cx="32" cy="32" r="20" fill="url(#fbBall)" filter="url(#fbGlow)"/>

  <!-- Soccer patch pattern — clipped SEPARATELY, no filter -->
  <g clip-path="url(#fbClip)">
    <!-- Central pentagon (pointing up, r=7) -->
    <polygon points="32,25 38.7,29.8 36.1,37.7 27.9,37.7 25.3,29.8"
             fill="#1a0840" stroke="#3B1F7A" stroke-width="0.7"/>
    <!-- Top pentagon (center at 32,18) -->
    <polygon points="32,22 28.2,19.2 29.7,14.8 34.3,14.8 35.8,19.2"
             fill="#1a0840" stroke="#3B1F7A" stroke-width="0.7"/>
    <!-- Upper-right pentagon (center at 45.3,27.7) -->
    <polygon points="41.5,28.9 43.0,24.5 47.7,24.5 49.1,28.9 45.3,31.7"
             fill="#1a0840" stroke="#3B1F7A" stroke-width="0.7"/>
    <!-- Lower-right pentagon (center at 40.2,43.3) -->
    <polygon points="37.9,40.1 42.5,40.1 44.0,44.5 40.2,47.3 36.4,44.5"
             fill="#1a0840" stroke="#3B1F7A" stroke-width="0.7"/>
    <!-- Lower-left pentagon (center at 23.8,43.3) -->
    <polygon points="26.2,40.1 27.6,44.5 23.8,47.3 20.0,44.5 21.5,40.1"
             fill="#1a0840" stroke="#3B1F7A" stroke-width="0.7"/>
    <!-- Upper-left pentagon (center at 18.7,27.7) -->
    <polygon points="22.5,28.9 18.7,31.7 14.9,28.9 16.4,24.5 21.1,24.5"
             fill="#1a0840" stroke="#3B1F7A" stroke-width="0.7"/>
  </g>

  <!-- Specular highlight -->
  <ellipse cx="26" cy="23" rx="5.5" ry="3.5"
           fill="white" opacity="0.25"
           transform="rotate(-25 26 23)"
           clip-path="url(#fbClip)"/>
</svg>
