  <circle cx="32" cy="10" r="8" fill="none" stroke="#C4B5FD" stroke-width="2" stroke-dasharray="3 3" opacity="0.7" style="animation: pulseTap 1.5s ease-out infinite; transform-origin: 32px 10px;"/>
  <circle cx="32" cy="10" r="14" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.45" style="animation: pulseTap 1.5s ease-out 0.3s infinite; transform-origin: 32px 10px;"/>
