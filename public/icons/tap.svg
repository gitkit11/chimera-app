      <stop offset="0%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </radialGradient>
    <linearGradient id="nailGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow">
