  </defs>
  <g filter="url(#glow)">
    <path d="M 22,54 C 20,54 19,52 19,50 L 19,26 C 19,18 24,12 32,12 C 40,12 45,18 45,26 L 45,50 C 45,52 44,54 42,54 Z" fill="url(#fingerGradient)"/>
