    <path d="M 21,44 Q 32,42 43,44" stroke="#4C1D95" opacity="0.3" stroke-width="1" fill="none"/>
    <path d="M 25,13 C 25,11 28,10 32,10 C 36,10 39,11 39,13 L 39,21 C 39,23 36,24 32,24 C 28,24 25,23 25,21 Z" fill="url(#nailGradient)"/>
