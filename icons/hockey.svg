<svg viewBox="0 0 64 64" width="64" height="64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hkBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64748B"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="hkStick1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <linearGradient id="hkStick2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2E8F0"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>
    <radialGradient id="hkPuck" cx="45%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="60%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
    <filter id="hkGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="3.5" flood-color="#CBD5E1" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0D0B1E"/>
  <rect width="64" height="64" rx="14" fill="none" stroke="url(#hkBorder)" stroke-width="1.5"/>

  <!-- Crossed sticks + puck with glow -->
  <g filter="url(#hkGlow)">
    <!-- Stick 1: top-left to bottom-right (rotated -40°) -->
    <g transform="translate(32,30) rotate(-40)">
      <!-- shaft -->
      <rect x="-2.5" y="-17" width="5" height="28" rx="2.5"
            fill="url(#hkStick1)" stroke="#0D0B1E" stroke-width="0.5"/>
      <!-- blade -->
      <path d="M -2.5,11 L -8,14 Q -9,17 -5,18 L 5,18 Q 7,17 6,14 L 2.5,11 Z"
            fill="url(#hkStick1)" stroke="#0D0B1E" stroke-width="0.5"/>
    </g>

    <!-- Stick 2: top-right to bottom-left (rotated +40°) -->
    <g transform="translate(32,30) rotate(40)">
      <!-- shaft -->
      <rect x="-2.5" y="-17" width="5" height="28" rx="2.5"
            fill="url(#hkStick2)" stroke="#0D0B1E" stroke-width="0.5"/>
      <!-- blade -->
      <path d="M -2.5,11 L -8,14 Q -9,17 -5,18 L 5,18 Q 7,17 6,14 L 2.5,11 Z"
            fill="url(#hkStick2)" stroke="#0D0B1E" stroke-width="0.5"/>
    </g>

    <!-- Puck (centered at 32,46) — in front of sticks -->
    <ellipse cx="32" cy="46" rx="10" ry="5.5" fill="url(#hkPuck)"/>
    <!-- Puck top edge highlight -->
    <path d="M 22,46 A 10,5.5 0 0,1 42,46"
          fill="none" stroke="#9CA3AF" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
    <!-- Puck bottom shadow -->
    <path d="M 22,46 A 10,5.5 0 0,0 42,46"
          fill="none" stroke="#030712" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Ice sparkle accents -->
  <g opacity="0.5">
    <circle cx="14" cy="18" r="1" fill="#E2E8F0"/>
    <circle cx="50" cy="16" r="1" fill="#E2E8F0"/>
    <circle cx="11" cy="42" r="0.8" fill="#94A3B8"/>
    <circle cx="52" cy="44" r="0.8" fill="#94A3B8"/>
  </g>
</svg>
