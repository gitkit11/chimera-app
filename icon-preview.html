<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #04020D; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 32px; font-family: monospace; color: #A78BFA; }
  .row { display: flex; gap: 24px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .item span { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.4); }
  img { border-radius: 14px; }
  h2 { color: rgba(255,255,255,.6); font-size: 12px; letter-spacing: .3em; text-transform: uppercase; margin: 0; }
</style>
</head>
<body>
  <h2>Sport Icons — 52px</h2>
  <div class="row">
    <div class="item"><img src="/icons/football.svg"   width="52" height="52"><span>Football</span></div>
    <div class="item"><img src="/icons/basketball.svg" width="52" height="52"><span>Basketball</span></div>
    <div class="item"><img src="/icons/tennis.svg"     width="52" height="52"><span>Tennis</span></div>
    <div class="item"><img src="/icons/cs2.svg"        width="52" height="52"><span>CS2</span></div>
    <div class="item"><img src="/icons/hockey.svg"     width="52" height="52"><span>Hockey</span></div>
  </div>
  <h2>64px</h2>
  <div class="row">
    <div class="item"><img src="/icons/football.svg"   width="64" height="64"></div>
    <div class="item"><img src="/icons/basketball.svg" width="64" height="64"></div>
    <div class="item"><img src="/icons/tennis.svg"     width="64" height="64"></div>
    <div class="item"><img src="/icons/cs2.svg"        width="64" height="64"></div>
    <div class="item"><img src="/icons/hockey.svg"     width="64" height="64"></div>
  </div>
</body>
</html>
